services:
  postgres:
    image: postgres:16-alpine
    container_name: bootstrap-hub-postgres-1
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bootstrap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bootstrap}
      POSTGRES_DB: ${POSTGRES_DB:-bootstrap_hub}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bootstrap} -d ${POSTGRES_DB:-bootstrap_hub}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: bootstrap-hub-web-1
    ports:
      - "${HOST_PORT:-18797}:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://bootstrap:bootstrap@postgres:5432/bootstrap_hub}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:18797}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      BUNDLE_SECRET: ${BUNDLE_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      STORAGE_ROOT: ${STORAGE_ROOT:-/data/bootstrap-hub}
    volumes:
      - ${STORAGE_ROOT:-/data/bootstrap-hub}:/data/bootstrap-hub
    depends_on:
      postgres:
        condition: service_healthy
    user: "0:0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  pgdata:
