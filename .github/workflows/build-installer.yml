name: Build PyInstaller Installer

on:
  push:
    branches: [main, master]
    paths:
      - 'installer/**'
      - '.github/workflows/build-installer.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'installer/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Windows installer executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r installer/requirements.txt

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --noconsole `
            --name BootstrapHubInstaller `
            --hiddenimport winreg `
            --distpath dist `
            --workpath build `
            installer/bootstrap_hub_installer.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BootstrapHubInstaller-exe
          path: dist/BootstrapHubInstaller.exe
